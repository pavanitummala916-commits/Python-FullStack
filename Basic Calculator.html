<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      body {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 40px;
        align-items: center;
        justify-content: center;
        background-color: burlywood;
      }
      .result {
        background-color: white;
        width: 60vw;
        height: 20vh;
        border-radius: 20px;
        box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.5);
        display: flex;
        gap: 40px;
        align-items: center;
        justify-content: center;
      }
      .box {
        padding: 30px;
        background-color: white;
        width: 50vw;
        height: 50vh;
        border: 5px solid white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.5);
        border-radius: 5%;
      }
      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
        column-gap: 60px;
      }

      .buttons > button {
        width: 60px;
        height: 40px;
        font-size: 20px;
        font-weight: bold;
        background-color: cadetblue;
        border: none;
        border-radius: 5px;
      }

      input[type="text"] {
        width: 80%;
        font-size: 30px;
        height: 20%;
      }
    </style>
  </head>
  <body>
    <div class="result">
      <h1 id="res">Enter values and click <br />operator to see output</h1>
    </div>
    <div class="box">
      <input type="text" id="val1" placeholder="Enter value1" />
      <input type="text" id="val2" placeholder="Enter value2" />
      <div class="buttons">
        <button onclick="addition()">+</button>
        <button onclick="subtraction()">-</button>
        <button onclick="multiplication()">*</button>
        <button onclick="division()">/</button>
        <button onclick="power()">**</button>
        <button onclick="reset()">reset</button>
      </div>
    </div>
    <script>
      //access ele's

      function addition() {
        let num1 = document.getElementById("val1").value; //input<>
        let num2 = document.getElementById("val2").value; //input<>
        let output = document.getElementById("res"); //<h1>

        let res = Number(num1) + Number(num2);
        output.innerText = res;
      }
      function subtraction() {
        let num1 = document.getElementById("val1").value; //input<>
        let num2 = document.getElementById("val2").value; //input<>
        let output = document.getElementById("res"); //<h1>

        let res = Number(num1) - Number(num2);
        output.innerText = res;
      }
    </script>
  </body>
</html>
