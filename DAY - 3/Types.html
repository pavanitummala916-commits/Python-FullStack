<html>
  <head>
    <title>Types</title>
  </head>
  <body>
    <form>
      <label>Enter your gender:</label>
      <input type="radio" name="Gender" id="m" value="Male" />
      <label for="m">Male: </label>
      <input type="radio" name="Gender" id="f" value="Female" />
      <label for="f">Female: </label>
      <br />
      <label>Skills:</label><br />
      <input type="checkbox" name="skill" id="j" value="Java" />
      <label for="j">Java</label>
      <input type="checkbox" name="skill" id="p" value="Python" />
      <label for="p">Python</label>
      <input type="checkbox" name="skill" id="c" value="C" />
      <label for="c">C</label><br />
      <input type="text" placeholder="Enter Name" /><br />
      <input type="email" placeholder="Enter email" /><br />
      <input type="password" placeholder="Enter password" /><br />
      <input type="search" placeholder="Search here" /><br />
      <label for="d">Enter DOB: </label>
      <input type="date" id="d" /><br />
      <input type="tel" placeholder="enter your num" /><br />
      <input type="number" name="age" placeholder="enter your age" /><br />
      <input type="url" name="url" placeholder="enter your linkedin" /><br />
      <input type="range" name="r" min="0" max="100" /><br />
      <input type="color" name="c" /><br />
      <input type="week" name="w" /><br />
      <input type="datetime-local" name="y" /><br />
      <input type="file" name="f" /><br />
      <input type="reset" />
      <input type="submit" />
    </form>
  </body>
</html>
