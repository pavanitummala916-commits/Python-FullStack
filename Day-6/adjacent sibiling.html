<html>
  <head>
    <title>Selectors</title>
    <style>
      h3 ~ p {
        color: blue;
      }
      h3 + p {
        color: purple;
      }
    </style>
  </head>
  <body>
    <h3>This is heading 1</h3>
    <p>This is para1</p>
    <p>This is para2</p>
    <p>This is para3</p>
    <p>This is para4</p>
  </body>
</html>
