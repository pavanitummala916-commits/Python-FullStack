<html>
    <head>
        <title>Pseudo Selector</title>
        <style>
        a{
            color:red;
            font-size:40px;
            text-transform:uppercase;
            text-decoration:none;
        }
        a:hover{
            background-color:black;
            color:chocolate;
        }
        a:active{
            color:yellow;
        }
        h1:hover{
            color:aqua;
            background-color:black;
            cursor:pointer;
        }
        h1:before{
            content:"😃";
        }
        h1:after{
            content:"✔";
        }
        </style>
    </head>
    <body>
        <h1>Pavani</h1> 
        <a href="https:www.youtube.com","a" click me /a>
    </body>
</html>
