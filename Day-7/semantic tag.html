<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semantic Tags</title>
    <style>
      body {
        margin: 0;
        text-align: center;
      }

      header {
        background-color: hotpink;
        height: 100px;
        line-height: 100px;
        font-size: 30px;
        font-weight: bold;
      }

      nav {
        background-color: greenyellow;
        height: 60px;
        line-height: 60px;
        font-size: 25px;
        font-weight: bold;
        position: sticky;
        top: 0;
      }

      main {
        display: flex;
      }

      .left {
        width: 75%;
      }

      section {
        background-color: aqua;
        height: 150px;
        line-height: 150px;
        font-size: 25px;
        font-weight: bold;
      }

      article {
        background-color: lightpink;
        height: 500px;
        line-height: 150px;
        font-size: 25px;
        font-weight: bold;
      }

      aside {
        background-color: brown;
        color: white;
        width: 25%;
        height: 650px;
        line-height: 300px;
        font-size: 25px;
        font-weight: bold;
      }

      footer {
        background-color: gray;
        color: white;
        height: 80px;
        line-height: 80px;
        font-size: 25px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <header>Header</header>

    <nav>Navigation Bar</nav>

    <main>
      <div class="left">
        <section>Section</section>
        <article>Article</article>
      </div>

      <aside>Aside</aside>
    </main>

    <footer>Footer</footer>
  </body>
</html>
