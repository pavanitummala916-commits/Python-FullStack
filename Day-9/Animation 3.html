<!doctype html>
<html lang="en">
  <head>
    <title>Animation</title>
    <style>
      .parent {
        width: 600px;
        height: 100px;
        border: 5px solid black;
        overflow: hidden;
        margin: 50px auto;
      }

      .group {
        display: flex;
        gap: 5px;
        width: max-content;
        animation: scroll 10s linear 0s infinite normal;
      }
      #group:hover {
        animation-play-state: paused;
      }
      @keyframes startgroup {
        from {
          transform: translateX(600px);
        }
        to {
          transform: translateX(-750px);
        }
      }

      .group > div {
        width: 100px;
        height: 90px;
        background-color: aqua;
        color: white;
        font-size: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      @keyframes scroll {
        from {
          transform: translateX(600px);
        }
        to {
          transform: translateX(-750px);
        }
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="group">
        <div>😃</div>
        <div>😄</div>
        <div>😀</div>
        <div>😆</div>
        <div>🙂</div>
        <div>6</div>
        <div>7</div>
      </div>
    </div>
  </body>
</html>
