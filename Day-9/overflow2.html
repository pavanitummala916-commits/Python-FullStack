<!doctype html>
<html lang="en">
<head>
  <title>Box Model</title>
  <style>
    .parent {
      width: 300px;
      height: 100px;
      border: 5px solid black;
      display: flex;
      gap: 5px;
    }

    .parent > div {
      flex: 0 1 auto;
      width: 90px;
      height: 100px;
      background-color: aqua;
      color: white;
      text-align: center;
      line-height: 100px;
    }
  </style>
</head>
<body>
  <div class="parent">
    <div class="child1">1</div>
    <div class="child2">2</div>
    <div class="child3">3</div>
  </div>
</body>
</html>s
