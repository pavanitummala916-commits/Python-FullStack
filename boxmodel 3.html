<html>
  <head>
    <title>Box Model</title>
    <style>
      body {
        background-color: lightgreen;
      }
      .parent1 {
        background-color: hotpink;
        border: 20px solid lightskyblue;
        padding: 40px;
      }
      .parent2 {
        background-color: pink;
        border: 20px solid lightsalmon;
        padding: 50px;
      }

      .child1 {
        background-color: white;
      }
      .child2 {
        background-color: darkblue;
        color: white;
      }
      .child3 {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <div class="parent1">
      <div class="child1">PAVANI</div>
      <div class="child2">MALLI</div>
      <div class="child3">NAVYA</div>
    </div>
    <div class="parent2">
      <div class="p2-child1">WELCOME</div>
    </div>
  </body>
</html>
